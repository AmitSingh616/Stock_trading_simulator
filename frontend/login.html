<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VirtualTrade</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="page-wrapper">
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <span class="dot"></span>
        VirtualTrade
      </div>

      <p style="text-align:center;color:var(--text-secondary);font-size:0.85rem;margin-bottom:28px">
        Sign in to your trading account
      </p>

      <div id="error-msg" style="display:none;background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:0.83rem;color:var(--red);margin-bottom:16px"></div>

      <form id="login-form" novalidate>
        <div style="margin-bottom:16px">
          <label class="form-label-dark">Email</label>
          <input type="email" id="email" class="form-dark" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div style="margin-bottom:24px">
          <label class="form-label-dark">Password</label>
          <input type="password" id="password" class="form-dark" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" id="submit-btn" class="btn-trade-buy" style="font-size:0.95rem;padding:12px">
          Sign In
        </button>
      </form>

      <div class="auth-divider">or</div>

      <p style="text-align:center;font-size:0.83rem;color:var(--text-secondary)">
        Don't have an account?
        <a href="register.html" style="color:var(--accent);text-decoration:none;font-weight:500">Create one</a>
      </p>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/api.js"></script>
<script>
  // If already logged in, redirect to dashboard
  (async () => {
    try {
      await Api.auth.me();
      window.location.href = 'index.html';
    } catch {}
  })();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');
    const errEl    = document.getElementById('error-msg');

    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      await Api.auth.login(email, password);
      window.location.href = 'index.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
